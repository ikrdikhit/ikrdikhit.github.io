<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Placeholders: __SITE_NAME__ __THEME_COLOR__ are dynamically generated via vite.config.ts -->

    <!-- Descriptive fallback title shown before React hydrates (and to crawlers without JS) -->
    <title>__SITE_NAME__ — Developer Portfolio</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="__THEME_COLOR__" />

    <!-- Preload critical fonts -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/dm-sans.woff2" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/playfair-display.woff2"
      crossorigin
    />

    <!-- Preload the profile picture — it's the LCP image on the About page -->
    <link rel="preload" as="image" href="/pfp.webp" type="image/webp" />

    <!--
      NOTE: The theme flash-prevention script is injected here automatically by
      the `inject-theme-script` Vite plugin defined in vite.config.ts.
      Do not add it manually — it is generated at build/serve time from
      the THEMES object in src/data/config.ts.
    -->

    <meta name="google-site-verification" content="9GTj5XZ6eWdYfaN8WeNatqyIrAppUiZMDAKyhJzChfI" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
